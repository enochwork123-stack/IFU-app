<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .organic-shape {
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            filter: blur(60px);
            opacity: 0.15;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-primary selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full bg-[#FBF9F5]/80 dark:bg-stone-900/80 backdrop-blur-md">
<div class="flex items-center justify-between px-8 h-16 w-full max-w-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#28351C] dark:text-[#E3E3DC]" data-icon="menu_book">menu_book</span>
<span class="font-['Noto_Serif'] font-bold text-[#28351C] dark:text-[#E3E3DC] text-xl tracking-tight">基督門徒訓練</span>
</div>
<button class="active:scale-95 transition-transform hover:opacity-80 transition-opacity flex items-center gap-2 bg-surface-container-lowest px-4 py-2 rounded-full shadow-sm border border-outline-variant/20">
<img alt="Google G logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9ELeWOusCZ5ysqn_W3Ng_4Eyesrovsl0OBkKBd-gmCU8I5dkI9OmQ6zxOermb40oiLSo9Z9JKEvy0BdxpdaxrlSOiGQLCSm1keEF_sTTQHXgACRRipNA6UBoJ7CtjSA6zZHvHJ5azW_gh6nyZu_K2xwrdVdXGNkIEG2R80iyVODGM6mqphQG5mkHKQT4tB04aClLBGZGZu26pW_MnhTFSh3Xbg_Hm2o5MGber5uOOJ4PmGLe8Nuz3ppSXIs7PCTOZDiRqy9qzcw"/>
<span class="font-label text-sm font-semibold text-on-surface">登錄</span>
</button>
</div>
<div class="bg-[#F5F3EF] dark:bg-stone-800 h-[1px] w-full"></div>
</header>
<main class="relative min-h-[884px] pt-24 pb-32 px-6 overflow-hidden" data-stitch-vh="min-h-[884px]===min-h-screen">
<!-- Organic Background Elements -->
<div class="absolute top-20 -right-20 w-64 h-64 organic-shape bg-primary pointer-events-none"></div>
<div class="absolute bottom-40 -left-20 w-80 h-80 organic-shape bg-secondary pointer-events-none"></div>
<!-- Hero Section -->
<section class="max-w-xl mx-auto mt-8 mb-16 text-center">
<h1 class="font-headline text-5xl md:text-6xl font-bold text-primary leading-tight tracking-tight mb-6">基督門徒訓練</h1>
<p class="font-body text-lg text-on-surface-variant leading-relaxed max-w-md mx-auto">在信仰中成長的旅程，一步一腳印。</p>
</section>
<!-- Feature Navigation Stack -->
<section class="max-w-md mx-auto space-y-6">
<!-- Card 1: The Gospel -->
<div class="group relative bg-surface-container-lowest p-8 rounded-xl shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/5 rounded-full -mr-16 -mt-16 transition-transform duration-700 group-hover:scale-150"></div>
<div class="relative flex items-start gap-6">
<div class="flex-shrink-0 w-14 h-14 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined text-3xl" data-icon="sunny">sunny</span>
</div>
<div class="flex-grow">
<h3 class="font-headline text-2xl font-semibold mb-2 text-primary">認識福音</h3>
<p class="font-body text-on-surface-variant">踏出信仰生活的第一步。</p>
</div>
<div class="self-center">
<span class="material-symbols-outlined text-secondary opacity-0 group-hover:opacity-100 transition-opacity translate-x-4 group-hover:translate-x-0 duration-300" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</div>
<!-- Card 2: Initial Follow-up -->
<div class="group relative bg-surface-container-lowest p-8 rounded-xl shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 transition-transform duration-700 group-hover:scale-150"></div>
<div class="relative flex items-start gap-6">
<div class="flex-shrink-0 w-14 h-14 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
<span class="material-symbols-outlined text-3xl" data-icon="footprint">footprint</span>
</div>
<div class="flex-grow">
<h3 class="font-headline text-2xl font-semibold mb-2 text-primary">初信栽培</h3>
<p class="font-body text-on-surface-variant">掌握聖經的教導 , 使你在基督裏的新生命健康成長。</p>
</div>
<div class="self-center">
<span class="material-symbols-outlined text-secondary opacity-0 group-hover:opacity-100 transition-opacity translate-x-4 group-hover:translate-x-0 duration-300" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</div>
<!-- Card 3: Bible Study -->
<div class="group relative bg-surface-container-lowest p-8 rounded-xl shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-tertiary-fixed/10 rounded-full -mr-16 -mt-16 transition-transform duration-700 group-hover:scale-150"></div>
<div class="relative flex items-start gap-6">
<div class="flex-shrink-0 w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
</div>
<div class="flex-grow">
<h3 class="font-headline text-2xl font-semibold mb-2 text-primary">查經學習</h3>
<p class="font-body text-on-surface-variant">深入探索神的話語。</p>
</div>
<div class="self-center">
<span class="material-symbols-outlined text-secondary opacity-0 group-hover:opacity-100 transition-opacity translate-x-4 group-hover:translate-x-0 duration-300" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</div>
</section>
<!-- Secondary CTA -->
<section class="mt-16 text-center">
<button class="inline-flex items-center px-8 py-4 bg-secondary text-on-secondary font-label font-bold rounded-full shadow-lg hover:shadow-secondary/20 transition-all duration-300 active:scale-95">開啟你的旅程</button>
<p class="mt-4 text-sm text-stone-500 font-label tracking-widest uppercase">每週更新課程</p>
</section>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 rounded-t-[2rem] bg-[#FBF9F5]/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-[0_-4px_24px_0_rgba(40,53,28,0.06)]">
<!-- 首頁 -->
<a class="flex flex-col items-center justify-center text-[#28351C]/60 dark:text-[#E3E3DC]/60 hover:text-[#795900] transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Manrope'] text-[11px] font-bold uppercase tracking-wider mt-1">首頁</span>
</a>
<!-- 旅程 (Active) -->
<a class="flex flex-col items-center justify-center text-[#795900] dark:text-[#C5A059] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#795900] after:rounded-full active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Manrope'] text-[11px] font-bold uppercase tracking-wider mt-1">旅程</span>
</a>
<!-- 媒體庫 -->
<a class="flex flex-col items-center justify-center text-[#28351C]/60 dark:text-[#E3E3DC]/60 hover:text-[#795900] transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Manrope'] text-[11px] font-bold uppercase tracking-wider mt-1">媒體庫</span>
</a>
<!-- 個人檔案 -->
<a class="flex flex-col items-center justify-center text-[#28351C]/60 dark:text-[#E3E3DC]/60 hover:text-[#795900] transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Manrope'] text-[11px] font-bold uppercase tracking-wider mt-1">個人檔案</span>
</a>
</nav>
</body></html>
