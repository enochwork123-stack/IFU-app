<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">出死入生</title>
  <desc id="desc">A visual transition from death and judgement into eternal life through faith in Christ.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171815"/>
      <stop offset="0.45" stop-color="#30312e"/>
      <stop offset="1" stop-color="#fbf9f5"/>
    </linearGradient>
    <radialGradient id="lifeGlow" cx="78%" cy="35%" r="56%">
      <stop offset="0" stop-color="#fff8dd"/>
      <stop offset="0.42" stop-color="#ffdfa0" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#d8e8c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#454840"/>
      <stop offset="0.43" stop-color="#795900"/>
      <stop offset="1" stop-color="#d8e8c4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="light" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="820" rx="56" fill="url(#bg)"/>
  <rect width="1200" height="820" rx="56" fill="url(#lifeGlow)"/>

  <g transform="translate(242 438)" filter="url(#shadow)">
    <circle cx="0" cy="-90" r="76" fill="#1b1c1a" stroke="#75786f" stroke-opacity="0.55" stroke-width="3"/>
    <path d="M-94 68C-58 -42 58 -42 94 68Z" fill="#1b1c1a" stroke="#75786f" stroke-opacity="0.38" stroke-width="3"/>
    <text x="0" y="-68" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="62" font-weight="900" fill="#dbdad6">死</text>
    <text x="0" y="146" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="35" font-weight="900" fill="#f2f0ed">定罪</text>
  </g>

  <g transform="translate(600 408)" filter="url(#shadow)">
    <path d="M-264 0H202" stroke="url(#path)" stroke-width="54" stroke-linecap="round"/>
    <path d="M176 -62L306 0L176 62Z" fill="#d8e8c4"/>
    <circle cx="0" cy="0" r="86" fill="#ffc641"/>
    <rect x="-22" y="-92" width="44" height="184" rx="9" fill="#795900"/>
    <rect x="-86" y="-20" width="172" height="40" rx="9" fill="#795900"/>
    <text x="0" y="154" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="31" font-weight="900" fill="#ffdfa0">信耶穌基督</text>
  </g>

  <g transform="translate(938 420)" filter="url(#shadow)">
    <circle cx="0" cy="-92" r="84" fill="#ffffff" fill-opacity="0.52" stroke="#ffdfa0" stroke-width="4"/>
    <path d="M-96 72C-58 -54 58 -54 96 72Z" fill="#d8e8c4" stroke="#ffffff" stroke-opacity="0.52" stroke-width="3"/>
    <text x="0" y="-66" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="64" font-weight="900" fill="#28351c">生</text>
    <text x="0" y="150" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="36" font-weight="900" fill="#28351c">永生</text>
  </g>

  <g transform="translate(600 130)">
    <text x="0" y="0" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="76" font-weight="900" fill="#ffffff" filter="url(#light)">出死入生</text>
    <text x="0" y="58" text-anchor="middle" font-family="Manrope, sans-serif" font-size="25" font-weight="800" letter-spacing="5" fill="#ffdfa0">PASSED FROM DEATH INTO LIFE</text>
  </g>

  <g transform="translate(600 704)">
    <rect x="-392" y="-58" width="784" height="116" rx="36" fill="#fbf9f5" fill-opacity="0.86" stroke="#ffffff" stroke-opacity="0.54"/>
    <text x="0" y="-10" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="30" font-weight="900" fill="#28351c">信的人就有永生，不至於定罪</text>
    <text x="0" y="34" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="24" font-weight="700" fill="#795900">約翰福音 5:24</text>
  </g>
</svg>
