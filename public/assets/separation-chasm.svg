<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">人的罪使人與神分隔</title>
  <desc id="desc">A warm editorial diagram showing humanity separated from God by a dark chasm labeled sin.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9f5"/>
      <stop offset="0.48" stop-color="#e5e1d5"/>
      <stop offset="1" stop-color="#30312e"/>
    </linearGradient>
    <linearGradient id="humanCliff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3e4c31"/>
      <stop offset="0.48" stop-color="#28351c"/>
      <stop offset="1" stop-color="#151613"/>
    </linearGradient>
    <linearGradient id="godCliff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="0.46" stop-color="#ffdfa0"/>
      <stop offset="1" stop-color="#795900"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="24%" r="52%">
      <stop offset="0" stop-color="#fff8dd" stop-opacity="0.94"/>
      <stop offset="0.4" stop-color="#ffdfa0" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#ffdfa0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="abyss" cx="50%" cy="56%" r="58%">
      <stop offset="0" stop-color="#060605"/>
      <stop offset="0.56" stop-color="#1b1c1a"/>
      <stop offset="1" stop-color="#30312e" stop-opacity="0.25"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#11120f" flood-opacity="0.28"/>
    </filter>
    <filter id="textShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M8 18h22M48 12h18M20 56h30M62 52h10" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" stroke-linecap="round"/>
      <path d="M15 35h18M52 34h14M32 72h18" stroke="#1b1c1a" stroke-opacity="0.08" stroke-width="2" stroke-linecap="round"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" rx="56" fill="url(#sky)"/>
  <rect width="1200" height="760" rx="56" fill="url(#glow)"/>
  <path d="M0 530C126 492 224 470 346 486C410 494 456 518 492 560L470 760H0Z" fill="url(#humanCliff)" filter="url(#softShadow)"/>
  <path d="M1200 460C1066 438 964 448 858 488C786 516 740 548 698 604L724 760H1200Z" fill="url(#godCliff)" filter="url(#softShadow)"/>
  <path d="M470 484C536 548 584 600 600 760H724C708 602 650 528 590 484C548 454 510 452 470 484Z" fill="url(#abyss)"/>
  <path d="M512 520C558 582 586 648 600 760" fill="none" stroke="#000000" stroke-opacity="0.38" stroke-width="16" stroke-linecap="round"/>
  <path d="M684 520C640 584 614 648 600 760" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="14" stroke-linecap="round"/>
  <rect width="1200" height="760" rx="56" fill="url(#grain)"/>

  <g transform="translate(252 410)" filter="url(#textShadow)">
    <circle cx="0" cy="-74" r="46" fill="#fbf9f5" fill-opacity="0.18" stroke="#fbf9f5" stroke-opacity="0.28"/>
    <path d="M-46 36C-28 -28 26 -28 46 36Z" fill="#fbf9f5" fill-opacity="0.16"/>
    <text x="0" y="-58" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="52" font-weight="900" fill="#fbf9f5">人</text>
    <text x="0" y="102" text-anchor="middle" font-family="Manrope, sans-serif" font-size="18" font-weight="800" letter-spacing="6" fill="#c5c8bd">HUMANITY</text>
  </g>

  <g transform="translate(930 380)" filter="url(#textShadow)">
    <circle cx="0" cy="-84" r="56" fill="#ffffff" fill-opacity="0.34" stroke="#fff8dd" stroke-opacity="0.62"/>
    <path d="M0 -154L16 -112L60 -118L30 -84L58 -48L12 -58L0 -16L-12 -58L-58 -48L-30 -84L-60 -118L-16 -112Z" fill="#ffffff" fill-opacity="0.8"/>
    <text x="0" y="-65" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="58" font-weight="900" fill="#5c4300">神</text>
    <text x="0" y="102" text-anchor="middle" font-family="Manrope, sans-serif" font-size="18" font-weight="800" letter-spacing="6" fill="#5c4300">HOLY GOD</text>
  </g>

  <g transform="translate(600 360)" filter="url(#textShadow)">
    <rect x="-102" y="-50" width="204" height="100" rx="50" fill="#11120f" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="0" y="18" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="58" font-weight="900" letter-spacing="18" fill="#ffffff">罪</text>
  </g>

  <g transform="translate(600 115)">
    <text x="0" y="0" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="58" font-weight="900" fill="#28351c">人的罪使人與神分隔</text>
    <text x="0" y="48" text-anchor="middle" font-family="Manrope, 'Noto Serif TC', sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#795900">SIN CREATES A CHASM</text>
  </g>
</svg>
